server:
  port: 8083
spring:
  application:
    name: local-deals-service
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: "${LOCAL_DEALS_DATASOURCE_URL:jdbc:mysql://localhost:3306/local_deals?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}"
    username: "${LOCAL_DEALS_DATASOURCE_USERNAME:root}"
    password: "${LOCAL_DEALS_DATASOURCE_PASSWORD}"
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  redis:
    host: "${LOCAL_DEALS_REDIS_HOST:localhost}"
    port: "${LOCAL_DEALS_REDIS_PORT:6379}"
    password: "${LOCAL_DEALS_REDIS_PASSWORD}"
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.localdeals.entity # 别名扫描包
logging:
  level:
    com.localdeals: debug
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
local-deals:
  seckill:
    stream:
      key: "stream.orders"
      group: "g1"
      consumer: "c1"
      dead-letter-key: "stream.orders.dlq"
      read-count: 10
      worker-count: 1
      block: 2s
      max-retry: 3
      retry-key-prefix: "seckill:stream:retry:"
